<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hartanto Workspace | Meeting Recaps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/main.css?v=3" />
  </head>
  <body>
    <div class="app-shell">
      <button class="mobile-menu-button icon-button" id="mobile-menu-button" type="button" aria-label="Open navigation menu">
        <i data-lucide="menu"></i>
      </button>
      <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

      <aside class="sidebar" aria-label="Sidebar navigation">
        <div class="sidebar-top">
          <div class="brand-bar">
            <div>
              <p class="brand-name">Hartanto Workspace</p>
              <p class="brand-text">(Software Engineer)</p>
            </div>
            <button
              class="icon-button sidebar-toggle"
              aria-label="Toggle sidebar"
              type="button"
            >
              <i data-lucide="panel-left-close"></i>
            </button>
          </div>

          <div class="search-group">
            <i data-lucide="search" class="input-icon"></i>
            <input
              id="sidebar-search"
              type="search"
              placeholder="Search menu..."
              aria-label="Search sidebar menu"
            />
          </div>

          <nav class="sidebar-nav" aria-label="Primary">
            <button class="nav-item" data-section="dashboard" type="button">
              <i data-lucide="layout-dashboard"></i>
              <span>Dashboard</span>
            </button>
            <button class="nav-item" data-section="bookmarks" type="button">
              <i data-lucide="bookmark"></i>
              <span>Bookmarks</span>
            </button>
            <div class="sidebar-divider">
              <span>MAIN MENU</span>
            </div>
            <button class="nav-item" data-section="action-items" type="button">
              <i data-lucide="list-checks"></i>
              <span>My Action Items</span>
            </button>
            <button class="nav-item active" data-section="all-meetings" type="button">
              <i data-lucide="calendar-days"></i>
              <span>All Meetings</span>
            </button>
            <div class="sidebar-divider">
              <span>PROJECTS</span>
            </div>
            <button class="nav-item" data-section="client-projects" type="button">
              <i data-lucide="folder-kanban"></i>
              <span>Client Projects</span>
            </button>
            <button class="nav-item" data-section="system-development" type="button">
              <i data-lucide="code-2"></i>
              <span>System Development</span>
            </button>
            <div class="sidebar-divider">
              <span>TEAM &amp; CULTURE</span>
            </div>
            <button class="nav-item" data-section="events-committees" type="button">
              <i data-lucide="users"></i>
              <span>Events &amp; Committees</span>
            </button>
            <button class="nav-item" data-section="tags" type="button">
              <i data-lucide="tags"></i>
              <span>Tags</span>
            </button>
            <div class="sidebar-divider">
              <span>VIEWS</span>
            </div>
            <button class="nav-item" data-section="weekly" type="button">
              <i data-lucide="calendar-range"></i>
              <span>Weekly Standup</span>
            </button>
            <button class="nav-item" data-section="design-review" type="button">
              <i data-lucide="pen-tool"></i>
              <span>Design Review</span>
            </button>
            <button class="nav-item" data-section="client-brief" type="button">
              <i data-lucide="file-text"></i>
              <span>Client Brief</span>
            </button>
          </nav>
        </div>

        <div class="sidebar-bottom">
          <button class="footer-item" data-section="settings" type="button">
            <i data-lucide="settings-2"></i>
            <span>Settings</span>
          </button>
          <button class="footer-item" data-section="notifications" type="button">
            <i data-lucide="bell"></i>
            <span>Notifications</span>
            <span class="notification-badge" aria-label="3 new notifications">3</span>
          </button>
          <div class="profile-card">
            <img
              src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39?auto=format&fit=crop&w=140&q=80"
              alt="User avatar"
            />
            <div>
              <p class="profile-name">Mia Sanchez</p>
              <p class="profile-role">Product Lead</p>
            </div>
            <button class="icon-button" aria-label="Open profile menu" type="button" style="margin-left: auto;">
              <i data-lucide="chevron-down"></i>
            </button>
          </div>
        </div>
      </aside>

      <main class="main-content" id="page-container">
        <!-- Content will be dynamically loaded here by js/navigation.js -->
        <div class="page-loader" style="display: flex; justify-content: center; align-items: center; height: 100%;">
          <i data-lucide="loader-2" style="animation: spin 1s linear infinite; width: 32px; height: 32px; color: var(--primary-accent);"></i>
        </div>
      </main>
    </div>

    <script type="module" src="js/app.js?v=3"></script>
  </body>
</html>
