<header class="topbar">
  <div>
    <p class="eyebrow">Preferences</p>
    <h1>Settings</h1>
  </div>
</header>
<div class="settings-panel">
  <div class="settings-group">
    <h3>Profile</h3>
    <div class="settings-field">
      <label>Display Name</label>
      <input type="text" value="Hartanto" class="settings-input" />
    </div>
    <div class="settings-field">
      <label>Email</label>
      <input type="email" value="hartanto@workspace.com" class="settings-input" />
    </div>
    <div class="settings-field">
      <label>Role</label>
      <input type="text" value="Software Engineer" class="settings-input" />
    </div>
  </div>
  <div class="settings-group">
    <h3>Appearance</h3>
    <div class="settings-field">
      <label>Theme</label>
      <select class="settings-input">
        <option>Light</option>
        <option>Dark</option>
        <option>System</option>
      </select>
    </div>
  </div>
  <div class="settings-group">
    <h3>Notifications</h3>
    <div class="settings-toggle-row">
      <span>Email Notifications</span>
      <label class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="settings-toggle-row">
      <span>Meeting Reminders</span>
      <label class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="settings-toggle-row">
      <span>Action Item Alerts</span>
      <label class="toggle-switch"><input type="checkbox"><span class="toggle-slider"></span></label>
    </div>
  </div>
</div>
